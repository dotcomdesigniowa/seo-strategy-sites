<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Strategy Portal | Dotcom Design</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f7fa; color: #334168; }
    header { background: #334168; padding: 20px 40px; display: flex; align-items: center; gap: 16px; }
    header img { height: 36px; }
    header span { color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    main { max-width: 800px; margin: 60px auto; padding: 0 24px; }
    h1 { font-size: 1.5rem; font-weight: 900; color: #334168; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 32px; font-size: 0.95rem; }
    .client-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .client-list a { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 10px; padding: 18px 24px; text-decoration: none; color: #334168; font-weight: 700; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-left: 4px solid #3F80EA; transition: box-shadow 0.15s; }
    .client-list a:hover { box-shadow: 0 4px 20px rgba(63,128,234,0.15); }
    .client-list a span { font-size: 0.8rem; color: #3F80EA; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>
<body>
  <header>
    <span>Dotcom Design &mdash; SEO Strategy Portal</span>
  </header>
  <main>
    <h1>Client SEO Strategies</h1>
    <p>Select a client below to view their SEO strategy report.</p>
    <ul class="client-list">
      <li><a href="/durhamstreeservice.com">Durham's Tree Service <span>View Strategy &rarr;</span></a></li>
      <li><a href="/mekfloors.com">MEK Interiors &amp; Floors <span>View Strategy &rarr;</span></a></li>
    </ul>
  </main>
</body>
</html>
